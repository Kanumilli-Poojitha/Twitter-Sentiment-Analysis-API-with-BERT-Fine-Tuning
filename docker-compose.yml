services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      - API_HOST=${API_HOST:-0.0.0.0}
      - API_PORT=${API_PORT:-8000}
      - MODEL_NAME=${MODEL_NAME:-distilbert-base-uncased}
      - MODEL_OUTPUT_DIR=${MODEL_OUTPUT_DIR:-model_output}
      - MAX_LENGTH=${MAX_LENGTH:-256}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    volumes:
      - ./model_output:/app/model_output
      - ./results:/app/results
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys;port=os.getenv('API_PORT','8000');url=f'http://localhost:{port}/health';sys.exit(0 if urllib.request.urlopen(url).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    env_file:
      - .env
    environment:
      - UI_PORT=${UI_PORT:-8501}
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-15}
    ports:
      - "${UI_PORT:-8501}:${UI_PORT:-8501}"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys;port=os.getenv('UI_PORT','8501');url=f'http://localhost:{port}';sys.exit(0 if urllib.request.urlopen(url).status==200 else 1)\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
